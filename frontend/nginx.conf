server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # React Router - serve index.html for all routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the api-gateway using Docker DNS resolver
  # resolver set to Docker's internal DNS so upstream is resolved at runtime
  location /api/ {
    resolver 127.0.0.11 valid=5s;
    set $upstream http://api-gateway:80;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    # Return 502 gracefully if api-gateway is down
    proxy_intercept_errors on;
    error_page 502 503 504 = @api_unavailable;
  }

  location @api_unavailable {
    return 503 '{"error":"API gateway unavailable"}';
    add_header Content-Type application/json;
  }

  # Cache static assets
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}