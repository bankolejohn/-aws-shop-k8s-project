grafana:
  enabled: true
  adminPassword: "admin123"

  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 200m

  # Datasources - Prometheus + Loki
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-operated:9090
        isDefault: true
        access: proxy

      - name: Loki
        type: loki
        url: http://loki-gateway:80
        access: proxy
        jsonData:
          maxLines: 1000
          derivedFields:
          - datasourceUid: tempo
            matcherRegex: "traceID=(\\w+)"
            name: TraceID
            url: "$${__value.raw}"

      - name: Tempo
        type: tempo
        url: http://tempo:3100
        access: proxy

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: kubernetes
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/kubernetes

      - name: ai-workloads
        orgId: 1
        folder: AI Workloads
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/ai-workloads

      - name: ecommerce
        orgId: 1
        folder: Ecommerce
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/ecommerce

  dashboards:
    kubernetes:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 27
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6417
        revision: 1
        datasource: Prometheus
      loki-logs:
        gnetId: 13639
        revision: 2
        datasource: Loki

    ai-workloads:
      # NVIDIA GPU dashboard
      nvidia-gpu:
        gnetId: 14574
        revision: 1
        datasource: Prometheus
      # GPU cluster dashboard
      gpu-cluster:
        gnetId: 15172
        revision: 1
        datasource: Prometheus

    ecommerce:
      # Custom ecommerce dashboard loaded from configmap
      ecommerce-overview:
        url: https://raw.githubusercontent.com/your-org/aws-ecommerce/main/monitoring/grafana/dashboards/ecommerce-overview.json

  grafana.ini:
    server:
      root_url: "https://grafana.yourdomain.com"
    security:
      allow_embedding: true
    feature_toggles:
      enable: lokiLive traceToLogs