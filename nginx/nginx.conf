events {
  worker_connections 1024;
}

http {
  # ── Upstreams ──────────────────────────────────
  upstream user-service      { server user-service:3000; }
  upstream product-service   { server product-service:3000; }
  upstream order-service     { server order-service:3000; }
  upstream payment-service   { server payment-service:3000; }
  upstream inventory-service { server inventory-service:3000; }
  upstream notification-service { server notification-service:3000; }

  # ── Rate limiting ──────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

  # ── Logging ────────────────────────────────────
  log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"upstream":"$upstream_addr",'
    '"response_time":$upstream_response_time,'
    '"request_id":"$request_id"}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log warn;

  server {
    listen 80;
    server_name localhost;

    # ── CORS headers ───────────────────────────
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    # ── Health check ───────────────────────────
    location = /health {
      return 200 '{"status":"healthy","gateway":"nginx","timestamp":"$time_iso8601"}';
      add_header Content-Type application/json;
    }

    # ── Route: User Service ────────────────────
    location ^~ /api/v1/users {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://user-service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Request-ID      $request_id;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # ── Route: Product Service ─────────────────
    location ^~ /api/v1/products {
      limit_req zone=api burst=50 nodelay;
      proxy_pass         http://product-service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Request-ID      $request_id;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # ── Route: Order Service ───────────────────
    location ^~ /api/v1/orders {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://order-service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Request-ID      $request_id;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 60s;
    }

    # ── Route: Payment Service ─────────────────
    location ^~ /api/v1/payments {
      limit_req zone=api burst=10 nodelay;
      proxy_pass         http://payment-service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Request-ID      $request_id;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 60s;
    }

    # ── Route: Inventory Service ───────────────
    location ^~ /api/v1/inventory {
      limit_req zone=api burst=30 nodelay;
      proxy_pass         http://inventory-service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Request-ID      $request_id;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # ── Route: Notification Service ────────────
    location ^~ /api/v1/notifications {
      limit_req zone=api burst=10 nodelay;
      proxy_pass         http://notification-service;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Request-ID      $request_id;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }
  }
}