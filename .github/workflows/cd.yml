name: CD

# Triggered automatically when the CI workflow completes successfully on main.
# Can also be triggered manually with a specific image tag.
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (defaults to latest)'
        required: false
        default: 'latest'

env:
  AWS_REGION: us-west-2

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    # For workflow_run: only proceed if CI passed
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name aws-ecommerce-dev

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to EKS
        run: |
          sed -i "s|:latest|:${{ steps.tag.outputs.tag }}|g" k8s/*/deployment.yaml
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/user-service/
          kubectl apply -f k8s/product-service/
          kubectl apply -f k8s/order-service/

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/user-service -n ecommerce
          kubectl rollout status deployment/product-service -n ecommerce
          kubectl rollout status deployment/order-service -n ecommerce

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.deploy.result }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
